# engramme-assist — profil d'exemple (valeurs factices).
# Copier vers ~/.obsidian-wiki/profile.yml (identité) et $VAULT/_meta/profile.yml (le reste).
# Lu par un LLM, pas un parser : les champs de jugement portent UNE ligne descriptive.

# --- Global (~/.obsidian-wiki/profile.yml) : identité stable ---
owner:
  name: Alex
  full_name: Alex Doe           # nom formel : recherche calendrier, titres de pages
  role: software architect      # pilote la grille de scoring (brief) par défaut
  team: ACME
  lang: en

# --- Vault ($VAULT/_meta/profile.yml) : contexte du vault, écrase le global ---
sources:
  slack:
    user_id: "U000EXAMPLE"          # pour les recherches from:<@user>
  confluence:
    spaces: ["ENG", "PRODUCT"]
  calendar: true
tools:
  model_tiers: { triage: haiku, synth: sonnet, deep: opus }
  link_format: wikilink
  retro_day: friday
brief:
  # Lu par un LLM : une ligne descriptive par axe (ni weight nu, ni pavé).
  scoring_axes:
    - { name: Pertinence architecturale,     weight: 3, description: "Affecte le design système, ADR, dette technique, dépendance cross-team." }
    - { name: Impact métier produit,          weight: 3, description: "Touche l'expérience utilisateur ou les métriques produit clés." }
    - { name: Urgence technique,              weight: 2, description: "Vulnérabilité, deprecation, incident prod, breaking change." }
    - { name: Signal d'évolution actionnable, weight: 2, description: "RFC, choix d'outil, réorg d'équipe, demande explicite." }
  thresholds: { must_read: 7, watch: 5 }
  role_fallback: >
    Si scoring_axes absent, dérive la grille depuis owner.role — manager :
    équipe/1:1, OKR/roadmap, escalades & risques, décisions stratégiques ;
    PM : valeur utilisateur, priorisation backlog, métriques produit.
